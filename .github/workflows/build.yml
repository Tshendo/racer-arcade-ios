name: build-game
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile
        run: |
          SDK=$(xcrun -sdk iphoneos --show-sdk-path)
          xcrun -sdk iphoneos clang -arch arm64 -mios-version-min=17.0 -O2 -fobjc-arc \
            -o App GamePhysics.m \
            -isysroot "$SDK" \
            -framework UIKit -framework WebKit -framework Foundation -framework CoreGraphics
          file App
          ls -la App
      - uses: actions/upload-artifact@v4
        with:
          name: game-binary
          path: App

  sign-and-package:
    runs-on: macos-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: game-binary
      - name: Package
        run: |
          mkdir -p App.app
          cp App App.app/App
          chmod +x App.app/App

          cat > App.app/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleExecutable</key><string>App</string>
            <key>CFBundleIdentifier</key><string>com.example.gamedemo</string>
            <key>CFBundleVersion</key><string>1.0</string>
            <key>CFBundleShortVersionString</key><string>1.0</string>
            <key>CFBundleName</key><string>GameDemo</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>UIRequiredDeviceCapabilities</key><array><string>arm64</string></array>
            <key>MinimumOSVersion</key><string>17.0</string>
            <key>LSRequiresIPhoneOS</key><true/>
            <key>LSApplicationCategoryType</key><string></string>
          </dict></plist>
          EOF

          codesign -f -s - App.app/App
          mkdir -p Payload
          cp -r App.app Payload/
          zip -r game.ipa Payload/
          ls -la game.ipa
      - uses: actions/upload-artifact@v4
        with:
          name: game-ipa
          path: game.ipa
